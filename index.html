<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Opera Style Browser</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: #0a0a12;
    color: white;
    display: flex;
}

/* Sidebar */
.sidebar {
    width: 70px;
    background: linear-gradient(180deg, #111, #0a0a12);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 15px;
    box-shadow: 0 0 15px #ff004c55;
}

.logo {
    font-size: 28px;
    color: #ff004c;
    margin-bottom: 20px;
}

/* Buttons */
.nav-btn {
    width: 45px;
    height: 45px;
    margin: 10px 0;
    border-radius: 12px;
    border: none;
    background: #1a1a2e;
    color: white;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
}

.nav-btn:hover {
    background: #ff004c;
    box-shadow: 0 0 10px #ff004c;
    transform: scale(1.1);
}

/* Main */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* Tabs */
.tabs {
    height: 40px;
    background: #111;
    display: flex;
    align-items: center;
    padding-left: 10px;
}

.tab {
    background: #1a1a2e;
    padding: 6px 15px;
    margin-right: 5px;
    border-radius: 8px;
}

.tab.active {
    background: #ff004c;
}

/* Address bar */
.topbar {
    height: 50px;
    background: #141424;
    display: flex;
    align-items: center;
    padding: 0 10px;
}

input {
    flex: 1;
    padding: 8px 15px;
    border-radius: 20px;
    border: none;
    background: #222;
    color: white;
}

button.go-btn {
    margin-left: 10px;
    padding: 8px 15px;
    border: none;
    border-radius: 10px;
    background: #ff004c;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="sidebar">
    <div class="logo">O</div>

    <button class="nav-btn" onclick="openExternal('https://www.youtube.com')">▶</button>
    <button class="nav-btn" onclick="openExternal('https://mail.google.com')">✉</button>
    <button class="nav-btn" onclick="openExternal('https://chatgpt.com')">💬</button>
</div>

<div class="main">

    <div class="tabs">
        <div class="tab active">Home</div>
    </div>

    <div class="topbar">
        <input id="url" placeholder="Enter URL...">
        <button class="go-btn" onclick="go()">Go</button>
    </div>

</div>

<script>
function openExternal(url) {
    window.open(url, '_blank');
}

function go() {
    let url = document.getElementById("url").value;

    if (!url.startsWith("http")) {
        url = "https://" + url;
    }

    window.open(url, '_blank');
}
</script>

</body>
</html>
